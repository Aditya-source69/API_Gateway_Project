# ============================================================================
# Secret: holds the shared JWT key. The auth service SIGNS tokens with it and
# the gateway VERIFIES with it — so both read the SAME value from here.
#
# Note: a Kubernetes Secret is only base64-encoded, NOT encrypted by default
# (same idea as a JWT payload — encoded, not secret-by-magic). It's still the
# right place for sensitive values: it keeps them out of your manifests, lets
# you control access, and can be encrypted at rest in real clusters.
# "stringData" lets you write plain text; Kubernetes encodes it for you.
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: gateway-secret
type: Opaque
stringData:
  SECRET_KEY: "fallback-only-for-local-dev-32chars!!"
