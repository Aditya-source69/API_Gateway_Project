# GitHub Actions CI pipeline.
# Lives in .github/workflows/ — GitHub finds it automatically and runs it.

name: CI

# WHEN to run: on every push to main, and on pull requests targeting main.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# WHAT to run. A "job" runs on a fresh cloud VM that GitHub spins up for you.
jobs:
  test-and-build:
    runs-on: ubuntu-latest        # the VM image to use

    steps:
      # "uses:" pulls in a prebuilt, shared action.
      - name: Check out the code
        uses: actions/checkout@v4          # clones your repo onto the VM

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # "run:" executes shell commands on the VM.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: pytest -v
        # If pytest fails (any test red), this step exits non-zero,
        # the whole job FAILS, and the steps below never run.

      - name: Build the Docker image
        run: docker build -t apigw:latest .
        # Only reached if tests passed — so a broken build can't ship.
