# GitHub Actions CI/CD pipeline with security scanning (DevSecOps).
# Lives in .github/workflows/ — GitHub runs it automatically on push/PR.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── GATE 1: TESTS (hard fail — blocks everything downstream) ──────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest -v

  # ── SAST: scan OUR SOURCE CODE for insecure patterns ──────────────────────
  # Catches e.g. hardcoded passwords, use of eval, weak crypto. Runs on code.
  sast:
    runs-on: ubuntu-latest
    continue-on-error: true          # report-only for now (not yet a hard gate)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install bandit
      - run: bandit -r gateway services

  # ── DEPENDENCY SCANNING (SCA): scan our LIBRARIES for known CVEs ───────────
  # Catches e.g. a vulnerable version of a package in requirements.txt.
  dependency-scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt

  # ── SECRET DETECTION: scan the REPO for leaked credentials ────────────────
  # Catches e.g. an API key or password accidentally committed.
  # Promoted from report-mode to a HARD GATE: a real leaked secret now fails the
  # pipeline. Known/reviewed findings are allowlisted in .gitleaksignore.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0             # full history so gitleaks can scan past commits
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── BUILD + CONTAINER SCANNING: build the image, scan it for CVEs ─────────
  # Only runs if tests passed. Trivy scans the image's OS packages + libraries.
  build-and-scan:
    runs-on: ubuntu-latest
    needs: test                      # gate: no build unless tests pass
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t apigw:latest .
      - name: Container scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: apigw:latest
          severity: HIGH,CRITICAL
          format: table
          exit-code: '0'             # report; findings triaged in NOTES.md
